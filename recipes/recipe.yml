---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: systemerror-os
# description will be included in the image's metadata
description: "Personal OS image: Bluefin DX base with niri + noctalia, custom daily apps"

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/bluefin-dx
image-version: 44 # tracks the latest Bluefin release (Fedora 44)

# module configuration, executed in order
modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        # Window manager & desktop shell
        - niri
        - noctalia

        # File management
        - nemo
        - nemo-fileroller

        # Documents
        - evince

        # Audio
        - pavucontrol

        # Network
        - network-manager-applet

        # System utilities
        - gnome-disk-utility

        # Shell
        - starship
        - dbus-broker
    remove:
      packages:
        # Core GNOME shell (replaced by niri + noctalia)
        - gnome-shell
        - gnome-session
        - gnome-control-center
        - gnome-software

        # GNOME apps → replaced alternatives
        - nautilus           # → nemo
        - gnome-text-editor  # → neovim (already in bluefin-dx)
        - gnome-tour
        - gnome-calculator   # → noctalia launcher has built-in calc
        - gnome-characters
        - gnome-weather
        - gnome-maps
        - gnome-calendar
        - gnome-clocks
        - gnome-contacts
        - gnome-connections
        - epiphany           # → firefox flatpak
        - gnome-user-docs
        - totem              # video player
        - gnome-photos
        - gnome-music
        - loupe              # → flatpak version

        # Browser system packages
        - firefox
        - firefox-langpacks  # → firefox flatpak

        # GNOME Shell extensions (not needed without gnome-shell)
        - gnome-shell-extension-apps-menu
        - gnome-shell-extension-background-logo
        - gnome-shell-extension-launchpad
        - gnome-shell-extension-window-list
        - gnome-shell-extension-places-menu
        - gnome-shell-extension-dash-to-dock

        # Dbus (replaced by dbus-broker)
        - dbus

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - one.ablaze.floorp
          - org.gnome.Loupe
          - com.ktechpit.whatsie
          - dev.vencord.Vesktop
          - io.freetubeapp.FreeTube
          - md.obsidian.Obsidian
          - net.ankiweb.Anki
          - org.blender.Blender
          - org.kde.krita
          - org.mozilla.thunderbird_esr
          - com.nextcloud.desktopclient.nextcloud
          - com.obsproject.Studio
      - scope: user

  - type: signing